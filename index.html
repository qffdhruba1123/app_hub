<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f0f1a">
    <title>App Hub 💖</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --card: #1a1a2e;
            --text: #eaeaea;
            --muted: #888;
            --pink: #ff6b9d;
            --purple: #c084fc;
            --blue: #60a5fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            text-align: center;
            padding: 60px 20px 20px;
        }

        header h1 {
            font-size: 2.8rem;
            background: linear-gradient(135deg, var(--pink), var(--purple), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        header p {
            color: var(--muted);
            font-size: 1.1rem;
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            padding: 40px 20px;
            max-width: 900px;
            width: 100%;
        }

        .app-card {
            background: var(--card);
            border: 1px solid #2a2a4a;
            border-radius: 20px;
            padding: 32px 24px;
            text-align: center;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .app-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            padding: 2px;
            background: linear-gradient(135deg, transparent, transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            transition: background 0.3s;
        }

        .app-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .app-card:hover::before {
            background: linear-gradient(135deg, var(--pink), var(--purple));
        }

        .app-icon {
            font-size: 3.5rem;
            margin-bottom: 16px;
            display: block;
        }

        .app-card h2 {
            font-size: 1.3rem;
            margin-bottom: 8px;
        }

        .app-card p {
            color: var(--muted);
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .badge {
            display: inline-block;
            background: rgba(78, 204, 163, 0.15);
            color: #4ecca3;
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 20px;
            margin-top: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge.coming-soon {
            background: rgba(255, 107, 157, 0.15);
            color: var(--pink);
        }

        footer {
            margin-top: auto;
            padding: 30px 20px;
            text-align: center;
            color: var(--muted);
            font-size: 0.85rem;
        }

        @media (max-width: 480px) {
            header { padding: 40px 16px 10px; }
            header h1 { font-size: 2rem; }
            header p { font-size: 0.95rem; }
            .apps-grid { padding: 24px 12px; gap: 14px; }
            .app-card { padding: 24px 18px; }
            .app-icon { font-size: 2.8rem; }
        }
    </style>
</head>
<body>
    <header>
        <h1>App Hub 💖</h1>
        <p>Little apps, made with love</p>
    </header>

    <div class="apps-grid">
        <a href="weight-tracker/" class="app-card">
            <span class="app-icon">⚖️</span>
            <h2>Weight Tracker</h2>
            <p>Track your weight, see trends, and get roasted by motivational messages.</p>
            <span class="badge">Live</span>
        </a>

        <!-- Future apps go here. Example: -->
        <!--
        <a href="new-app/" class="app-card">
            <span class="app-icon">🎯</span>
            <h2>New App</h2>
            <p>Description of the new app.</p>
            <span class="badge coming-soon">Coming Soon</span>
        </a>
        -->
    </div>

    <footer>
        Made with ❤️ for you
    </footer>
</body>
</html>
